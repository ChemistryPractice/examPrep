<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Preparation Hub</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --error: #c0392b; --bg: #f4f7f6; --sidebar-w: 260px; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        #sidebar { width: var(--sidebar-w); background: var(--primary); color: white; display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #sidebar h2 { font-size: 1.2rem; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #455a64; padding-bottom: 10px; }
        .nav-btn { background: none; border: 1px solid #455a64; color: white; padding: 12px; margin-bottom: 8px; border-radius: 5px; cursor: pointer; text-align: left; transition: 0.3s; }
        .nav-btn:hover { background: #34495e; }
        .nav-btn.active { background: var(--accent); border-color: var(--accent); }
        .ref-group { margin-top: auto; border-top: 1px solid #455a64; padding-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .ref-btn { background: #7f8c8d; font-size: 0.9rem; }

        /* Main Content Styles */
        #main-content { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); width: 100%; max-width: 700px; position: relative; }
        h1 { color: var(--primary); margin-top: 0; }
        
        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        .options-list { list-style: none; padding: 0; }
        .option-item { border: 1px solid #ddd; margin-bottom: 10px; padding: 15px; border-radius: 8px; cursor: pointer; transition: 0.2s; position: relative; }
        .option-item:hover { background: #f9f9f9; border-color: #bdc3c7; }
        .option-item.correct { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .option-item.wrong { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        
        .explanation { margin-top: 15px; padding: 15px; border-radius: 8px; background: #e8f4fd; border-left: 5px solid #3498db; display: none; }
        
        .controls { display: flex; justify-content: space-between; margin-top: 30px; }
        .nav-nav-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .nav-nav-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Reference Overlays */
        .overlay { display: none; position: fixed; top: 10%; left: 300px; right: 50px; bottom: 10%; background: white; box-shadow: 0 0 50px rgba(0,0,0,0.5); border-radius: 10px; z-index: 100; padding: 20px; border: 2px solid var(--primary); }
        .overlay-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; margin-bottom: 15px; }
        .close-btn { background: var(--error); color: white; border: none; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>ACS Preparation</h2>
    <button class="nav-btn active" onclick="loadTopic('atomic')">Atomic Structure</button>
    <button class="nav-btn" onclick="loadTopic('molecular')">Molecular Structure</button>
    <button class="nav-btn" onclick="loadTopic('stoichiometry')">Stoichiometry</button>
    <button class="nav-btn" onclick="loadTopic('solutions')">Solution Chemistry</button>
    <button class="nav-btn" onclick="loadTopic('gaslaws')">Gas Laws</button>
    <button class="nav-btn" onclick="loadTopic('kinetics')">Kinetics</button>
    <button class="nav-btn" onclick="loadTopic('equilibrium')">Equilibrium</button>
    <button class="nav-btn" onclick="loadTopic('thermo')">Thermodynamics</button>
    <button class="nav-btn" onclick="loadTopic('electro')">Electrochemistry</button>

    <div class="ref-group">
        <button class="nav-btn ref-btn" onclick="toggleRef('calc')">Calculator</button>
        <button class="nav-btn ref-btn" onclick="toggleRef('ptable')">Periodic Table</button>
        <button class="nav-btn ref-btn" onclick="toggleRef('eqn')">Equation Sheet</button>
    </div>
</div>

<div id="main-content">
    <div class="card" id="quiz-container">
        <h1 id="topic-title">Atomic Structure</h1>
        <div id="question-area">
            <div id="q-content"></div>
            <div id="explanation-area" class="explanation"></div>
            <div class="controls">
                <button class="nav-nav-btn" id="prev-btn" onclick="changeQuestion(-1)">Previous</button>
                <span id="progress-text">Question 1 of 3</span>
                <button class="nav-nav-btn" id="next-btn" onclick="changeQuestion(1)">Next</button>
            </div>
        </div>
    </div>
</div>

<div id="calc" class="overlay">
    <div class="overlay-header"><h3>Scientific Calculator</h3><button class="close-btn" onclick="toggleRef('calc')">X</button></div>
    <p>Calculator Tool Coming Soon - Use system calculator for now.</p>
</div>
<div id="ptable" class="overlay">
    <div class="overlay-header"><h3>Periodic Table</h3><button class="close-btn" onclick="toggleRef('ptable')">X</button></div>
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Periodic_table_large.png" width="100%" alt="Periodic Table">
</div>
<div id="eqn" class="overlay">
    <div class="overlay-header">
        <h3>Reference Equations</h3>
        <button class="close-btn" onclick="toggleRef('eqn')">X</button>
    </div>
    <object data="Equation_Sheet2.pdf" type="application/pdf" width="100%" height="90%">
        <p>It looks like your browser doesn't support embedded PDFs. 
           <a href="Equation_Sheet2.pdf" target="_blank">Click here to open it in a new tab.</a>
        </p>
    </object>
</div>

<script>
   // --- COMPREHENSIVE QUESTION DATABASE ---
    const database = {
        // 1. ATOMIC STRUCTURE
        atomic: [
            // --- QUANTUM NUMBERS & ORBITALS ---
            {
                q: "Which set of quantum numbers (n, l, ml, ms) is possible for an electron in a 3p orbital?",
                options: ["3, 1, 0, +1/2", "3, 0, 0, +1/2", "3, 2, -1, -1/2", "2, 1, 1, +1/2"],
                correct: "3, 1, 0, +1/2",
                exp: "For a 3p orbital, n=3 and l=1. The ml value must be between -l and +l."
            },
            {
                q: "What is the maximum number of electrons that can occupy the n=3 shell?",
                options: ["18", "8", "32", "10"],
                correct: "18",
                exp: "The formula is 2n². For n=3, 2(3)² = 18 electrons (2 in 3s, 6 in 3p, 10 in 3d)."
            },
            {
                q: "Which quantum number determines the 'shape' of an orbital?",
                options: ["l (Angular Momentum)", "n (Principal)", "ml (Magnetic)", "ms (Spin)"],
                correct: "l (Angular Momentum)",
                exp: "l=0 is spherical (s), l=1 is polar (p), l=2 is cloverleaf (d)."
            },
            {
                q: "How many orbitals are in a 'g' subshell (l=4)?",
                options: ["9", "7", "5", "4"],
                correct: "9",
                exp: "The number of orbitals is 2l + 1. For l=4, (2*4)+1 = 9."
            },

            // --- ELECTRON CONFIGURATION ---
            {
                q: "What is the correct electron configuration for the Cu⁺ ion?",
                options: ["[Ar] 3d¹⁰", "[Ar] 4s¹ 3d⁹", "[Ar] 4s² 3d⁸", "[Ar] 4s¹ 3d¹⁰"],
                correct: "[Ar] 3d¹⁰",
                exp: "Neutral Cu is [Ar] 4s¹ 3d¹⁰. To form Cu⁺, the 4s electron is removed first."
            },
            {
                q: "How many unpaired electrons are in a ground-state gaseous Fe²⁺ ion?",
                options: ["4", "6", "0", "2"],
                correct: "4",
                exp: "Fe is [Ar] 4s² 3d⁶. Fe²⁺ loses the 4s electrons, leaving 3d⁶. Following Hund's Rule, there are 4 unpaired electrons."
            },
            {
                q: "Which element has the ground-state electron configuration [Kr] 5s² 4d¹⁰ 5p³?",
                options: ["Sb", "As", "Bi", "Sn"],
                correct: "Sb",
                exp: "Antimony (Sb) is in the 5th period, Group 15 (5p³)."
            },
            {
                q: "Which of the following is paramagnetic in its ground state?",
                options: ["Oxygen", "Zinc", "Neon", "Calcium"],
                correct: "Oxygen",
                exp: "Oxygen has two unpaired electrons in its 2p subshell."
            },

            // --- PERIODIC TRENDS ---
            {
                q: "Which atom has the largest first ionization energy?",
                options: ["F", "O", "C", "Li"],
                correct: "F",
                exp: "IE increases left to right and bottom to top. Fluorine is the most electronegative/highest IE here."
            },
            {
                q: "Which of the following is the correct order of increasing atomic radius?",
                options: ["O < C < Si < Al", "Al < Si < C < O", "Si < Al < O < C", "C < O < Al < Si"],
                correct: "O < C < Si < Al",
                exp: "Radius decreases left to right and increases top to bottom."
            },
            {
                q: "Which ion is the largest?",
                options: ["S²⁻", "Cl⁻", "K⁺", "Ca²⁺"],
                correct: "S²⁻",
                exp: "In an isoelectronic series, the ion with the lowest atomic number (least protons) is the largest."
            },
            {
                q: "Which element has the most negative (most exothermic) electron affinity?",
                options: ["Cl", "Na", "Mg", "Ar"],
                correct: "Cl",
                exp: "Halogens have the most negative electron affinities as they are one electron away from a full shell."
            },

            // --- LIGHT & ENERGY (The Math) ---
            {
                q: "Which transition in a hydrogen atom would emit a photon with the longest wavelength?",
                options: ["n=4 to n=3", "n=3 to n=2", "n=2 to n=1", "n=4 to n=1"],
                correct: "n=4 to n=3",
                exp: "Longest wavelength = Lowest energy. The gaps between shells get smaller as n increases."
            },
            {
                q: "What is the energy of a photon with a frequency of 5.0 × 10¹⁴ Hz? (h = 6.626 × 10⁻³⁴ J·s)",
                options: ["3.3 × 10⁻¹⁹ J", "1.3 × 10⁻⁴⁸ J", "7.5 × 10⁻⁷ J", "1.5 × 10⁵ J"],
                correct: "3.3 × 10⁻¹⁹ J",
                exp: "E = hν. (6.626 × 10⁻³⁴)(5.0 × 10¹⁴) = 3.313 × 10⁻¹⁹ J."
            },
            {
                q: "The work function of a metal is 4.0 eV. If light with 5.0 eV energy hits the metal, what is the KE of the ejected electron?",
                options: ["1.0 eV", "4.0 eV", "9.0 eV", "0 eV"],
                correct: "1.0 eV",
                exp: "Photoelectric effect: KE = E(photon) - Φ(work function). 5.0 - 4.0 = 1.0 eV."
            },

            // --- HISTORY & MODELS ---
            {
                q: "The Gold Foil experiment by Rutherford proved that:",
                options: ["The nucleus is small, dense, and positive", "Electrons are in shells", "Atoms are solid spheres", "Neutrons exist"],
                correct: "The nucleus is small, dense, and positive",
                exp: "Most alpha particles passed through, but some deflected, indicating a tiny positive nucleus."
            },
            {
                q: "Who is credited with the discovery of the electron via Cathode Ray Tube experiments?",
                options: ["J.J. Thomson", "Robert Millikan", "Ernest Rutherford", "John Dalton"],
                correct: "J.J. Thomson",
                exp: "Thomson discovered the electron and proposed the 'Plum Pudding' model."
            },
            {
                q: "The Heisenberg Uncertainty Principle states that we cannot simultaneously know the exact:",
                options: ["Position and Momentum", "Energy and Time", "Mass and Velocity", "Charge and Spin"],
                correct: "Position and Momentum",
                exp: "Δx Δp ≥ h/4π. Measuring one accurately increases the uncertainty of the other."
            },

            // --- ISOTOPES & MASS ---
            {
                q: "An isotope with 20 protons and 22 neutrons is:",
                options: ["Calcium-42", "Titanium-42", "Zirconium-40", "Calcium-20"],
                correct: "Calcium-42",
                exp: "Protons (20) define the element (Ca). Mass number = 20 + 22 = 42."
            },
            {
                q: "Silver has two isotopes: ¹⁰⁷Ag (106.9 amu, 51.8%) and ¹⁰⁹Ag (108.9 amu, 48.2%). What is the average atomic mass?",
                options: ["107.9 amu", "108.0 amu", "107.0 amu", "108.5 amu"],
                correct: "107.9 amu",
                exp: "(106.9 * 0.518) + (108.9 * 0.482) = 107.86 amu."
            },

            // ... (I have 10 more ready if you'd like to reach the full 30, but these 20 cover the core ACS requirements)
        // --- ADVANCED ELECTRON BEHAVIOR ---
            {
                q: "What is the ground-state electron configuration of the Chromium atom (Cr, Z=24)?",
                options: ["[Ar] 4s¹ 3d⁵", "[Ar] 4s² 3d⁴", "[Ar] 3d⁶", "[Ar] 4s² 3d⁵"],
                correct: "[Ar] 4s¹ 3d⁵",
                exp: "Chromium is an exception; it promotes a 4s electron to the 3d subshell to achieve two half-filled subshells, which is more stable."
            },
            {
                q: "Calculate the DeBroglie wavelength of an electron (m = 9.11 × 10⁻³¹ kg) moving at 2.2 × 10⁶ m/s. (h = 6.626 × 10⁻³⁴ J·s)",
                options: ["3.3 × 10⁻¹⁰ m", "1.2 × 10⁻¹² m", "6.6 × 10⁻⁷ m", "5.5 × 10⁻³⁴ m"],
                correct: "3.3 × 10⁻¹⁰ m",
                exp: "λ = h / (mv). λ = 6.626e-34 / (9.11e-31 * 2.2e6) = 3.3e-10 meters."
            },
            {
                q: "According to Slater's Rules, what is the approximate effective nuclear charge (Zeff) felt by a 2p electron in Fluorine (Z=9)?",
                options: ["5.20", "7.00", "9.00", "2.00"],
                correct: "5.20",
                exp: "Electrons in the same shell shield 0.35, and the n-1 shell shields 0.85. Zeff = 9 - [(6 * 0.35) + (2 * 0.85)] = 5.20."
            },

            // --- PHOTOELECTRON SPECTROSCOPY (PES) ---
            {
                q: "In a Photoelectron Spectrum (PES), the intensity (height) of a peak is proportional to:",
                options: ["Number of electrons in that subshell", "The energy of the orbital", "The atomic mass", "The velocity of the atom"],
                correct: "Number of electrons in that subshell",
                exp: "A peak for 3d¹⁰ will be five times higher than a peak for 4s²."
            },
            {
                q: "Which element's PES spectrum would show exactly four peaks?",
                options: ["Magnesium", "Sodium", "Neon", "Boron"],
                correct: "Magnesium",
                exp: "Mg is 1s² 2s² 2p⁶ 3s². Each subshell (1s, 2s, 2p, 3s) creates one distinct peak."
            },

            // --- CONCEPTUAL ATOMIC THEORY ---
            {
                q: "Which property of an electron is described by the magnetic quantum number (ml)?",
                options: ["Spatial orientation", "Spin direction", "Energy level", "Orbital size"],
                correct: "Spatial orientation",
                exp: "ml defines which specific orbital (like px, py, or pz) the electron occupies."
            },
            {
                q: "The 'Aufbau Principle' states that:",
                options: ["Electrons fill lower-energy orbitals first", "No two electrons can have the same 4 quantum numbers", "Electrons stay unpaired as long as possible", "Atoms prefer full octets"],
                correct: "Electrons fill lower-energy orbitals first",
                exp: "Aufbau is German for 'building up'—filling from 1s upward."
            },
            {
                q: "Which species is isoelectronic with the Argon atom?",
                options: ["P³⁻", "S⁻", "Cl", "K"],
                correct: "P³⁻",
                exp: "Phosphorus (15e⁻) plus 3 extra electrons equals 18e⁻, the same as Argon."
            },
            {
                q: "Which series of the Hydrogen emission spectrum falls in the visible light region?",
                options: ["Balmer Series", "Lyman Series", "Paschen Series", "Brackett Series"],
                correct: "Balmer Series",
                exp: "Balmer series (transitions to n=2) produces visible light. Lyman (to n=1) is UV."
            },
            {
                q: "What is the total number of p-electrons in a neutral Germanium atom (Z=32)?",
                options: ["14", "12", "6", "2"],
                correct: "14",
                exp: "Config: 1s² 2s² 2p⁶ 3s² 3p⁶ 4s² 3d¹⁰ 4p². Total p = 6 (from 2p) + 6 (from 3p) + 2 (from 4p) = 14."
            }
        ],
    

        // 2. MOLECULAR STRUCTURE
        molecular: [
            {
                q: "According to VSEPR theory, what is the molecular geometry of SF₄?",
                options: ["See-saw", "Tetrahedral", "Square Planar", "Trigonal Bipyramidal"],
                correct: "See-saw",
                exp: "SF₄ has 5 electron domains (4 bonds, 1 lone pair). The geometry is see-saw."
            },
            {
                q: "What is the hybridization of the central carbon in CO₂?",
                options: ["sp", "sp²", "sp³", "dsp³"],
                correct: "sp",
                exp: "Carbon in CO₂ has two double bonds and zero lone pairs (2 domains), requiring sp hybridization."
            },
            {
                q: "Which molecule is polar?",
                options: ["NH₃", "BF₃", "CCl₄", "CO₂"],
                correct: "NH₃",
                exp: "NH₃ is trigonal pyramidal; the bond dipoles do not cancel out, resulting in a net dipole."
            },
            // --- VSEPR & GEOMETRY ---
            {
                q: "What is the molecular geometry of the ICl₂⁻ ion?",
                options: ["Linear", "Bent", "T-shaped", "Square Planar"],
                correct: "Linear",
                exp: "Iodine has 7 valence electrons, +1 for the charge = 8. Two Cl bonds and three lone pairs (AX₂E₃) results in a linear molecular geometry."
            },
            {
                q: "Which molecule has a trigonal pyramidal molecular geometry?",
                options: ["PH₃", "BF₃", "SO₃", "CO₃²⁻"],
                correct: "PH₃",
                exp: "Phosphorus has 5 valence electrons. In PH₃, there are 3 bonding pairs and 1 lone pair, creating a pyramid shape."
            },
            {
                q: "What are the ideal bond angles in a molecule with octahedral electron geometry?",
                options: ["90° and 180°", "109.5°", "120°", "90° and 120°"],
                correct: "90° and 180°",
                exp: "Octahedral geometry consists of axes at right angles to each other (90°) and opposite positions at 180°."
            },
            {
                q: "Which species has a 'See-saw' molecular geometry?",
                options: ["SF₄", "XeF₄", "ClF₃", "CF₄"],
                correct: "SF₄",
                exp: "SF₄ has 5 electron domains (4 bonds, 1 lone pair). This is the 'See-saw' orientation of a trigonal bipyramid."
            },

            // --- HYBRIDIZATION ---
            {
                q: "What is the hybridization of the sulfur atom in SO₂?",
                options: ["sp²", "sp", "sp³", "dsp³"],
                correct: "sp²",
                exp: "Sulfur in SO₂ has two bonding domains (double bonds) and one lone pair. 3 domains = sp²."
            },
            {
                q: "A molecule with sp³d² hybridization at the central atom corresponds to which electron geometry?",
                options: ["Octahedral", "Trigonal Bipyramidal", "Tetrahedral", "Square Planar"],
                correct: "Octahedral",
                exp: "sp³d² involves 6 hybrid orbitals, which characteristic of octahedral electron geometry."
            },
            {
                q: "How many sigma (σ) and pi (π) bonds are in a molecule of ethyne (H-C≡C-H)?",
                options: ["3 σ and 2 π", "2 σ and 3 π", "5 σ and 0 π", "3 σ and 1 π"],
                correct: "3 σ and 2 π",
                exp: "Each single bond is a σ. A triple bond consists of 1 σ and 2 π. Total = 3 σ and 2 π."
            },

            // --- POLARITY & IMFs ---
            {
                q: "Which of the following molecules has a net dipole moment (is polar)?",
                options: ["SF₄", "CF₄", "XeF₄", "CO₂"],
                correct: "SF₄",
                exp: "SF₄ is asymmetrical due to its lone pair (See-saw). The others are highly symmetrical, so their dipoles cancel."
            },
            {
                q: "Which substance would you expect to have the highest boiling point?",
                options: ["CH₃OH", "CH₄", "CH₃CH₃", "CH₃Cl"],
                correct: "CH₃OH",
                exp: "Methanol (CH₃OH) exhibits Hydrogen Bonding, which is significantly stronger than the dispersion forces or dipole-dipole forces in the others."
            },
            {
                q: "What is the formal charge on the central nitrogen atom in the azide ion (N₃⁻)?",
                options: ["+1", "0", "-1", "+2"],
                correct: "+1",
                exp: "In the most stable resonance structure [N=N=N]⁻, the central N has 4 bonds and 0 lone pairs. FC = 5 - (4 + 0) = +1."
            },

            // --- BONDING THEORY ---
            {
                q: "According to Molecular Orbital (MO) theory, what is the bond order of the O₂ molecule?",
                options: ["2", "1", "1.5", "2.5"],
                correct: "2",
                exp: "O₂ has 12 valence electrons in its MO diagram. (8 bonding - 4 antibonding) / 2 = 2."
            },
            {
                q: "Which property is associated with a paramagnetic molecule?",
                options: ["Attracted to a magnetic field", "Repelled by a magnetic field", "Has only paired electrons", "Is always polar"],
                correct: "Attracted to a magnetic field",
                exp: "Paramagnetism is caused by the presence of one or more unpaired electrons, which are attracted to magnetic fields."
            },
            {
                q: "As the bond order between two atoms increases, the bond length _______ and the bond energy _______.",
                options: ["decreases, increases", "increases, decreases", "increases, increases", "decreases, decreases"],
                correct: "decreases, increases",
                exp: "Higher bond order (e.g., triple vs single) means the atoms are pulled closer (shorter) and held more tightly (stronger)."
            },
            {
                q: "What is the molecular geometry of XeF₂?",
                options: ["Linear", "Bent", "T-shaped", "Trigonal Planar"],
                correct: "Linear",
                exp: "XeF₂ has 5 electron domains (2 bonds, 3 lone pairs). The lone pairs occupy the equatorial positions, leaving the F-Xe-F bond linear."
            },
            {
                q: "Which molecule contains at least one sp² hybridized carbon atom?",
                options: ["C₂H₄", "C₂H₆", "C₂H₂", "CH₄"],
                correct: "C₂H₄",
                exp: "Ethene (C₂H₄) contains a carbon-carbon double bond. Each carbon has 3 domains, which is sp²."
            },
            // --- RESONANCE & FORMAL CHARGE ---
            {
                q: "Which molecule or ion exhibits resonance?",
                options: ["SO₃", "CH₄", "NH₄⁺", "H₂O"],
                correct: "SO₃",
                exp: "Sulfur trioxide has three equivalent potential locations for the double bond, resulting in resonance."
            },
            {
                q: "What is the formal charge on the central phosphorus atom in the phosphate ion (PO₄³⁻) if the octet rule is satisfied?",
                options: ["+1", "0", "-1", "+5"],
                correct: "+1",
                exp: "With 4 single bonds and no lone pairs, FC = 5 - (4 + 0) = +1. (Note: In some models where P expands its octet, the FC could be 0, but ACS often tests the octet version first)."
            },
            {
                q: "How many resonance structures can be drawn for the nitrate ion (NO₃⁻)?",
                options: ["3", "2", "4", "1"],
                correct: "3",
                exp: "There are three oxygen atoms that can each take the double bond position, creating three equivalent resonance structures."
            },

            // --- DEVIATIONS FROM IDEAL ANGLES ---
            {
                q: "Which molecule has the smallest bond angle?",
                options: ["H₂O", "NH₃", "CH₄", "CO₂"],
                correct: "H₂O",
                exp: "All are based on tetrahedral geometry except CO₂. H₂O has 2 lone pairs which push the bonds closer together (~104.5°) than NH₃ (1 lone pair, ~107°)."
            },
            {
                q: "The bond angles in ClF₃ are slightly less than:",
                options: ["90° and 180°", "109.5°", "120°", "180° only"],
                correct: "90° and 180°",
                exp: "ClF₃ is T-shaped (from a trigonal bipyramid). The two axial lone pairs compress the 90° and 180° angles."
            },

            // --- MOLECULAR ORBITAL THEORY & BOND ORDER ---
            {
                q: "According to MO theory, which of the following is diamagnetic?",
                options: ["N₂", "O₂", "B₂", "NO"],
                correct: "N₂",
                exp: "N₂ has 10 valence electrons. In its MO diagram, all electrons are paired. O₂ and B₂ are famously paramagnetic."
            },
            {
                q: "What is the bond order of the He₂⁺ ion?",
                options: ["0.5", "0", "1", "1.5"],
                correct: "0.5",
                exp: "He₂⁺ has 3 electrons. (2 bonding - 1 antibonding) / 2 = 0.5."
            },
            {
                q: "Which molecule has a bond order of 3?",

        // 3. STOICHIOMETRY
        stoichiometry: [

                q: "If 10.0 g of Mg (MM = 24.3) reacts with excess HCl, how many moles of H₂ gas are produced?",

        gaslaws: [

    let currentQuestions = [];
    let currentIdx = 0;
    let answeredQuestions = {}; // To store user's choice for each question

    function loadTopic(topic) {
        // Toggle Sidebar Active state
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('topic-title').innerText = topic.charAt(0).toUpperCase() + topic.slice(1);
        
        // Randomize 3 questions from database
        let allQ = database[topic] || [];
        currentQuestions = allQ.sort(() => 0.5 - Math.random()).slice(0, 5);
        currentIdx = 0;
        answeredQuestions = {};
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuestions[currentIdx];
        const qArea = document.getElementById('q-content');
        const expArea = document.getElementById('explanation-area');
        
        expArea.style.display = 'none';
        document.getElementById('progress-text').innerText = `Question ${currentIdx + 1} of ${currentQuestions.length}`;
        document.getElementById('prev-btn').disabled = currentIdx === 0;
        document.getElementById('next-btn').disabled = currentIdx === currentQuestions.length - 1;

        // Shuffle options so correct answer isn't always 'A'
        if (!q.shuffledOptions) {
            q.shuffledOptions = [...q.options].sort(() => 0.5 - Math.random());
        }

        let html = `<p class="question-text">${q.q}</p><ul class="options-list">`;
        q.shuffledOptions.forEach(opt => {
            let stateClass = "";
            if (answeredQuestions[currentIdx]) {
                if (opt === q.correct) stateClass = "correct";
                else if (opt === answeredQuestions[currentIdx]) stateClass = "wrong";
            }
            html += `<li class="option-item ${stateClass}" onclick="checkAnswer('${opt}')">${opt}</li>`;
        });
        html += `</ul>`;
        
        qArea.innerHTML = html;

        if (answeredQuestions[currentIdx]) {
            expArea.innerText = q.exp;
            expArea.style.display = 'block';
        }
    }

    function checkAnswer(choice) {
        if (answeredQuestions[currentIdx]) return; // Only allow one choice
        answeredQuestions[currentIdx] = choice;
        renderQuestion();
    }

    function changeQuestion(dir) {
        currentIdx += dir;
        renderQuestion();
    }

    function toggleRef(id) {
        const el = document.getElementById(id);
        const isVisible = el.style.display === 'block';
        
        // Hide all overlays first to prevent stacking
        document.querySelectorAll('.overlay').forEach(ov => ov.style.display = 'none');
        
        if (!isVisible) {
            el.style.display = 'block';
            
            // Load content if it hasn't been loaded yet
            if (id === 'ptable' && !el.querySelector('iframe')) {
                el.innerHTML = `<div class="overlay-header"><h3>PTable.com</h3><button class="close-btn" onclick="toggleRef('ptable')">X</button></div>
                                <iframe src="https://ptable.com/?embed=1" width="100%" height="90%" style="border:none;"></iframe>`;
            }
            if (id === 'calc' && !el.querySelector('iframe')) {
                el.innerHTML = `<div class="overlay-header"><h3>Scientific Calculator</h3><button class="close-btn" onclick="toggleRef('calc')">X</button></div>
                                <iframe src="https://www.desmos.com/scientific" width="100%" height="90%" style="border:none;"></iframe>`;
            }
        }
    }

    // Initialize with Atomic
    window.onload = () => loadTopic('atomic');
</script>
